<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA: manifest y colores del club -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#014181" />

    <!-- iOS: comportamiento de app instalada -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Atl. Quarte" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Windows / Edge -->
    <meta name="msapplication-TileColor" content="#014181" />
    <meta name="msapplication-TileImage" content="/icons/icon-192x192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96x96.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="App de gestión para CD Atlético Quarte – plantilla, entrenamientos, tácticas y pizarra." />
    <title>CD Atlético Quarte</title>

    <!-- Google Fonts: Montserrat (títulos) + Inter (texto) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-quarte-gris font-cuerpo text-quarte-negro">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Registro del Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
